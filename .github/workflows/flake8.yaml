name: WPS

on:
  push:
    paths:
      - 'reditools/**py'
      - 'test/**py'
  pull_request:
    paths:
      - 'reditools/**py'
      - 'test/**py'

jobs:
  unittest:
    name: wemake-python-styleguide
    runs-on: ubuntu-latest
    steps:
      - uses: ConorMacBride/install-package@v1
        with:
          apt: libbz2-dev  zlib1g-dev liblzma-dev build-essential
      - uses: actions/checkout@v6
      - name: Checkout
        uses: actions/checkout@master
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install the project
        run: uv sync --extra wps --dev
      - name: Run tests
        run: uv run -m flake8 reditools/ test/
